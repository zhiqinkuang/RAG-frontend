# ============================================
# Unified CI/CD Pipeline for RAG Frontend
# ============================================
# Workflow: Lint → Test → Build → Security → Docker → Deploy
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - dev
      - feature/*
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to production'
        required: false
        default: 'false'
        type: boolean
      rollback:
        description: 'Rollback to previous version'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.29.2'
  REGISTRY: ghcr.io
  IMAGE_NAME: rag-frontend

jobs:
  # ============================================
  # Lint & Type Check
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

  # ============================================
  # Unit Tests
  # ============================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test || echo "No tests configured"

  # ============================================
  # E2E Tests (Playwright)
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e:ci || echo "No E2E tests"

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ============================================
  # Build
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/standalone
            .next/static
            public
          retention-days: 1

  # ============================================
  # Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run npm audit
        run: |
          npm audit --audit-level=high || true

      - name: Run Trivy fs scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ============================================
  # Docker Build & Push
  # ============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.rollback == 'false')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_full: ${{ steps.image-name.outputs.image }}:${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image-name
        run: echo "image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-name.outputs.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          flavor: |
            latest=false

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_RAG_API_URL=http://${{ secrets.ALIYUN_HOST }}:8080

      - name: Image scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image-name.outputs.image }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ============================================
  # Deploy to Production
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: ${{ secrets.ALIYUN_PORT || 22 }}
          script: |
            set -e

            # Configuration
            IMAGE="${{ needs.docker.outputs.image_full }}"
            CONTAINER="rag-frontend"

            echo "=== Deploying Frontend ==="
            echo "Image: $IMAGE"
            echo "Container: $CONTAINER"

            cd /opt/rag

            # Login to GHCR
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull new image
            echo "Pulling image..."
            docker pull $IMAGE

            # Stop old container (keep for rollback)
            echo "Stopping old container..."
            docker compose stop frontend || true
            docker rename $CONTAINER ${CONTAINER}-backup-$(date +%s) || true

            # Update docker-compose.yml image tag
            sed -i "s|image: ghcr.io/${{ github.repository_owner }}/rag-frontend:.*|image: $IMAGE|" docker-compose.yml || true

            # Start new container
            echo "Starting new container..."
            docker compose up -d frontend --no-deps

            # Wait for health check
            echo "Waiting for health check..."
            sleep 15
            for i in {1..6}; do
              if curl -sf http://localhost:3000 -o /dev/null 2>/dev/null; then
                echo "Health check passed!"
                break
              fi
              if [ $i -eq 6 ]; then
                echo "Health check failed, rolling back..."
                docker compose stop frontend
                docker rename ${CONTAINER}-backup-* $CONTAINER 2>/dev/null || true
                docker compose up -d frontend --no-deps
                exit 1
              fi
              echo "Attempt $i failed, retrying..."
              sleep 5
            done

            # Cleanup old backup containers (keep last 2)
            echo "Cleaning up old backups..."
            docker ps -a --filter "name=${CONTAINER}-backup" --format "{{.Names}}" | \
              sort -r | tail -n +3 | xargs -r docker rm -f

            # Prune unused images
            docker image prune -f

            echo "=== Deployment Complete ==="

      - name: External health check
        run: |
          echo "Checking external endpoint..."
          sleep 20
          for i in {1..10}; do
            status=$(curl -sf http://${{ secrets.ALIYUN_HOST }}:3000 -o /dev/null -w "%{http_code}" || echo "000")
            if [ "$status" = "200" ]; then
              echo "External health check passed!"
              exit 0
            fi
            echo "Attempt $i: status $status, retrying in 5s..."
            sleep 5
          done
          echo "External health check failed"
          exit 1

  # ============================================
  # Rollback
  # ============================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.rollback == 'true'
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            set -e

            CONTAINER="rag-frontend"
            cd /opt/rag

            echo "=== Rolling Back ==="

            # Find last backup container
            BACKUP=$(docker ps -a --filter "name=${CONTAINER}-backup" --format "{{.Names}}" | sort -r | head -1)

            if [ -z "$BACKUP" ]; then
              echo "No backup found!"
              exit 1
            fi

            echo "Found backup: $BACKUP"

            # Stop current
            docker compose stop frontend || true
            docker rm -f $CONTAINER || true

            # Restore backup
            docker rename $BACKUP $CONTAINER
            docker compose up -d frontend --no-deps

            echo "=== Rollback Complete ==="