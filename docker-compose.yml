# ============================================
# Docker Compose for Next.js Frontend
# ============================================
# Development: docker-compose up
# Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

version: '3.8'

services:
  # ============================================
  # Frontend Service
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 写入 next.config rewrites：容器内访问「宿主机上的 8080」用 host.docker.internal；
        # 若前端与 rag-api 在同一 compose 且服务名为 rag-api，改为 http://rag-api:8080
        RAG_API_PROXY_TARGET: ${RAG_API_PROXY_TARGET:-http://host.docker.internal:8080}
        # 留空：浏览器请求同源 /api/v1/*，由 Next 服务端转发到 RAG_API_PROXY_TARGET（免 CORS）
        NEXT_PUBLIC_RAG_API_URL: ${NEXT_PUBLIC_RAG_API_URL:-}
    image: webchat-frontend:latest
    container_name: webchat-frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - webchat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================
  # Nginx Reverse Proxy (Optional)
  # ============================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: webchat-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - webchat-network
  #   depends_on:
  #     - frontend

networks:
  webchat-network:
    driver: bridge